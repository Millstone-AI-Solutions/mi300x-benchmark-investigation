services:
  vllm:
    image: vllm/vllm-openai-rocm:latest
    container_name: vllm-server
    ports:
      - "8000:8000"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: "32g"
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE
    volumes:
      - /data/models/huggingface:/root/.cache/huggingface
    environment:
      - TORCH_BLAS_PREFER_HIPBLASLT=1
      - NCCL_MIN_NCHANNELS=112
      - VLLM_ROCM_USE_AITER=1
    command: >
      --model Qwen/Qwen3.5-122B-A10B-FP8
      --host 0.0.0.0
      --port 8000
      --served-model-name Qwen3.5-122B-A10B-FP8
      --gpu-memory-utilization 0.9
      --max-model-len 262144
      --reasoning-parser qwen3
      --language-model-only
    restart: unless-stopped

  amd-metrics-exporter:
    image: rocm/device-metrics-exporter:v1.4.2
    container_name: amd-metrics-exporter
    ports:
      - "9400:5000"
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped